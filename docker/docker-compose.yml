x-common: &common
  network_mode: "host"
  command: /bin/zsh -c "while sleep 1000; do :; done"

services:
  jetson:
    <<: *common
    profiles: ["jetson"]
    platform: linux/arm64
    volumes:
      - ..:/workspace:cached
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    env_file: ../.env
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        BASE_IMAGE: althack/ros2:humble-full
      network: host
    image: go2-lab:jetson
    container_name: jetson
    ipc: "host"
    runtime: nvidia
