services: 
  unitree_ros2-jetson:
    volumes: 
      - ..:/workspace:cached
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /mnt/wslg:/mnt/wslg
      - /root/.gazebo/models/:/root/.gazebo/models/
      - /var/run/docker.sock:/var/run/docker.sock 
      - $HOME/.Xauthority:/tmp/.Xauthority:rw
    environment:
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=/tmp/.Xauthority
      - NVIDIA_DRIVER_CAPABILITIES=all
      - NVIDIA_VISIBLE_DEVICES=all

    cap_add:
      - SYS_PTRACE  
    command: /bin/sh -c "while sleep 1000; do :; done"
 
    build:
      context: .
      dockerfile: Dockerfile.jetson
    image: unitree_ros2:jetson
    container_name: unitree_ros2-jetson
    
    # run `cd .devcontainer/ && docker build . -t ros2-humble-dev:latest -f Dockerfile-humble` 
    # to use the development environment, or you can build it with Dockerfile.
    # Perhaps Unitree will provide a dockerhub image later to save you time compiling.
    privileged: true
    runtime: nvidia
    network_mode: "host"

  unitree_ros2-azure:
    volumes:
      - ..:/workspace:cached
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /mnt/wslg:/mnt/wslg
      - /root/.gazebo/models/:/root/.gazebo/models/
      - /var/run/docker.sock:/var/run/docker.sock
      - $HOME/.Xauthority:/tmp/.Xauthority:rw
    environment:
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=/tmp/.Xauthority

    cap_add:
      - SYS_PTRACE
    command: /bin/sh -c "while sleep 1000; do :; done"

    build:
      context: .
      dockerfile: Dockerfile.azure
    image: unitree_ros2:azure
    container_name: unitree_ros2-azure

    # run `cd .devcontainer/ && docker build . -t ros2-humble-dev:latest -f Dockerfile-humble`
    # to use the development environment, or you can build it with Dockerfile.
    # Perhaps Unitree will provide a dockerhub image later to save you time compiling.
    privileged: true
    network_mode: "host"
  fast-lio-ros2:
    build:
      context: .
      dockerfile: Dockerfile.slam
      network: host
    image: fast-lio-ros2
    container_name: fast-lio-ros2
    stdin_open: true
    tty: true

    privileged: true

    # --net=host
    network_mode: "host"

    # --ipc=host
    ipc: "host"

    # --shm-size=4gb
    shm_size: "4gb"

    # 旧docker-compose互換のGPU指定
    runtime: nvidia

    environment:
      NVIDIA_DRIVER_CAPABILITIES: "all"
      NVIDIA_VISIBLE_DEVICES: "all"
      DISPLAY: ${DISPLAY}
    working_dir: /workspace

    volumes:
      # ホストのディレクトリ構成をそのまま使う
      - ..:/workspace:cached

      # --volume=/data/LIDAR_dataset:/root/data
      - /data/LIDAR_dataset:/root/data

      # --volume=/tmp/.X11-unix:/tmp/.X11-unix:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

    command: /bin/bash -lc "while sleep 1000; do :; done"
    
