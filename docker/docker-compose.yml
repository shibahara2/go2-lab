services:
  bridge:
    profiles: ["bridge"]
    platform: linux/amd64
    volumes:
      - ..:/workspace:cached
    env_file: ../.env.bridge
    command: /bin/zsh -c "while sleep 1000; do :; done"
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        BASE_IMAGE: osrf/ros:humble-desktop-full
    image: go2-lab:bridge
    container_name: bridge
    network_mode: "host"

  jetson:
    profiles: ["jetson"]
    platform: linux/arm64
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        BASE_IMAGE: althack/ros2:humble-full
      network: host
    image: go2-lab:jetson
    container_name: jetson
    stdin_open: true
    tty: true
    network_mode: "host"
    ipc: "host"
    shm_size: "${DOCKER_SHM_SIZE:-4gb}"
    runtime: nvidia
    env_file: ../.env.jetson
    dns:
      - 8.8.8.8
      - 1.1.1.1
    working_dir: /workspace
    volumes:
      - ..:/workspace:cached
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    command: /bin/zsh -c "while sleep 1000; do :; done"
